# Railway config-as-code. Declares how Railway builds and runs the serving image.
# Nothing is deployed by this file alone; it takes effect when the repo is connected
# to a Railway service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /-/versions.json returns 200 and never redirects. /malaria 302-redirects under
# datasette-hashed-urls, and the /malaria-<hash> path changes every rebake, so neither
# is usable as a stable healthcheck.
healthcheckPath = "/-/versions.json"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Single instance: a Railway volume (for the runtime-written geocode cache) attaches to
# one replica, and the geocode cache has a single SQLite writer.
numReplicas = 1
