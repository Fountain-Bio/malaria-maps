<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Malaria Region Tracker — Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    :root { --red:#cb181d; --amber:#fd8d3c; --grey:#dfe3e8; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, "Segoe UI", sans-serif; }
    #map { position: absolute; inset: 0; }
    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 2;
      background: rgba(255,255,255,0.94); padding: 10px 16px;
      border-bottom: 1px solid #d6dbe0; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 650; }
    header .sub { font-size: 12px; color: #5b6670; }
    header a { color: #1b6ec2; text-decoration: none; }
    .legend { display: flex; gap: 14px; font-size: 12px; margin-left: auto; align-items: center; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .sw { width: 13px; height: 13px; border-radius: 3px; border: 1px solid #aab2ba; }
    #panel {
      position: absolute; top: 64px; right: 0; bottom: 0; width: 380px; max-width: 92vw; z-index: 2;
      background: #fff; border-left: 1px solid #d6dbe0; box-shadow: -4px 0 18px rgba(0,0,0,0.07);
      overflow-y: auto; padding: 18px 20px; transform: translateX(105%); transition: transform .18s ease;
    }
    #panel.open { transform: none; }
    #panel h2 { font-size: 18px; margin: 0 6px 0 0; }
    .badge { display: inline-block; font-size: 11px; font-weight: 650; padding: 3px 9px;
      border-radius: 999px; color: #fff; vertical-align: middle; }
    .b-whole { background: var(--red); } .b-partial { background: var(--amber); color:#5a2a00; }
    .b-none { background: #8a939b; }
    #panel .close { float: right; cursor: pointer; color: #8a939b; font-size: 20px; line-height: 1; border: 0; background: none; }
    .field { margin-top: 14px; }
    .field .k { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #7a8794; margin-bottom: 3px; }
    .field .v, .field .v ul { font-size: 13.5px; color: #1f2a33; }
    .field .v ul { margin: 4px 0 0; padding-left: 18px; }
    .links { margin-top: 18px; font-size: 12.5px; display: flex; gap: 14px; }
    .updated { color: #8a939b; font-size: 11.5px; margin-top: 16px; }
    .rules-btn { font-size: 12px; font-weight: 600; color: #1b6ec2; background: #eef4fb;
      border: 1px solid #cfe0f2; border-radius: 6px; padding: 5px 11px; cursor: pointer; align-self: center; }
    .rules-btn:hover { background: #e2eefb; }
    #rules {
      position: absolute; top: 64px; left: 0; bottom: 0; width: 410px; max-width: 92vw; z-index: 3;
      background: #fff; border-right: 1px solid #d6dbe0; box-shadow: 4px 0 18px rgba(0,0,0,0.08);
      overflow-y: auto; padding: 16px 22px; transform: translateX(-105%); transition: transform .18s ease;
    }
    #rules.open { transform: none; }
    #rules h2 { font-size: 17px; margin: 0 6px 0 0; }
    #rules .close { float: right; cursor: pointer; color: #8a939b; font-size: 20px; line-height: 1; border: 0; background: none; }
    .rules-sub { font-size: 12px; color: #7a8794; margin: 2px 0 4px; }
    .rule { border-top: 1px solid #eceff2; padding: 11px 0; }
    .rule-h { font-weight: 650; font-size: 13.5px; color: #1f2a33; }
    .rule-d { font-size: 13px; color: #36424c; margin-top: 3px; }
    .rule-m { font-size: 12px; color: #4a5560; margin-top: 4px; }
    .rule-c { font-size: 11px; color: #97a0a8; margin-top: 5px; }
    .implic { background: #fbf6ec; border: 1px solid #f0e3c8; border-radius: 8px; padding: 10px 12px; }
    .implic .k { color: #8a6d1f; }
    .implic .v ul { margin: 2px 0 0; padding-left: 18px; }
    .implic-note { font-size: 11px; color: #9a8a63; margin-top: 7px; }
    #search { display: flex; gap: 6px; align-items: center; }
    #search input { font-size: 13px; padding: 6px 10px; border: 1px solid #cfd6dd; border-radius: 6px; width: 210px; }
    #search button { font-size: 13px; padding: 6px 12px; border: 0; border-radius: 6px; background: #1b6ec2; color: #fff; cursor: pointer; }
    .verdict-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .vbadge { font-size: 12px; font-weight: 650; padding: 4px 10px; border-radius: 6px; }
    .v-defer { background: var(--red); color: #fff; }
    .v-ok { background: #2e7d32; color: #fff; }
    .v-review { background: var(--amber); color: #5a2a00; }
    .conf { font-size: 11.5px; color: #7a8794; margin-top: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
    .chip { font-size: 11.5px; padding: 4px 9px; border: 1px solid #cfd6dd; border-radius: 999px; background: #f5f7f9; cursor: pointer; }
    .chip:hover { background: #e9eef3; }
    .geo-credit { font-size: 10.5px; color: #9aa3ab; margin-top: 16px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Malaria Region Tracker</h1>
      <div class="sub">CDC chemoprophylaxis-based endemic classification &middot;
        <a href="/malaria/v_malaria_current">table</a> &middot;
        <a href="/malaria/change_event">changes</a> &middot;
        <span id="counts">loading…</span></div>
    </div>
    <form id="search" autocomplete="off">
      <input id="city-input" type="text" placeholder="Search a city or town…" aria-label="Search a city" />
      <button type="submit">Check</button>
    </form>
    <div class="legend">
      <span><i class="sw" style="background:var(--red)"></i> Whole country</span>
      <span><i class="sw" style="background:var(--amber)"></i> Partial (areas)</span>
      <span><i class="sw" style="background:var(--grey)"></i> Not endemic</span>
    </div>
    <button id="rules-btn" class="rules-btn">Screening rules</button>
  </header>
  <div id="map"></div>
  <aside id="panel"><button class="close" onclick="document.getElementById('panel').classList.remove('open')">&times;</button>
    <div id="panel-body"></div>
  </aside>
  <aside id="rules"><button class="close" onclick="document.getElementById('rules').classList.remove('open')">&times;</button>
    <h2>FDA screening rules</h2>
    <div class="rules-sub">Recommendations to Reduce the Risk of Transfusion-Transmitted Malaria — Guidance for Industry (final, 12/2022)</div>
    <div id="rules-body">loading…</div>
  </aside>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
